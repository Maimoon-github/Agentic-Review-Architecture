{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AgentFlow — Multi-Agent Orchestration{% endblock %}</title>
  <meta name="description" content="{% block description %}Multi-agent AI orchestration pipeline powered by Claude Sonnet.{% endblock %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens ─────────────────────────────────────────── */
    :root {
      --bg-900:  #070B14;
      --bg-800:  #0C1121;
      --bg-700:  #111827;
      --bg-600:  #1a2235;
      --bg-500:  #22304a;
      --border:  rgba(99,179,237,0.12);
      --border-h: rgba(99,179,237,0.3);

      --accent:  #63b3ed;
      --accent-2:#7c3aed;
      --accent-3:#10b981;
      --accent-4:#f59e0b;
      --danger:  #ef4444;

      --text-100: #f0f4ff;
      --text-200: #bcc8e0;
      --text-300: #7a8fad;
      --text-400: #4a5568;

      --radius-sm: 6px;
      --radius:    12px;
      --radius-lg: 18px;
      --radius-xl: 24px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow:    0 4px 20px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);

      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg-900);
      color: var(--text-100);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button, input, textarea, select {
      font-family: inherit;
    }

    /* ── Scrollbar ─────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-800); }
    ::-webkit-scrollbar-thumb { background: var(--bg-500); border-radius: 3px; }

    /* ── Layout ────────────────────────────────────────────────── */
    .page-wrapper { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Navbar ────────────────────────────────────────────────── */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,11,20,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }
    .navbar-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center;
      height: 62px; gap: 2rem;
    }
    .navbar-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.15rem; font-weight: 700; color: var(--text-100);
      text-decoration: none;
    }
    .navbar-brand:hover { text-decoration: none; }
    .brand-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .navbar-links { display: flex; gap: 0.25rem; margin-left: auto; }
    .nav-link {
      color: var(--text-200); padding: 0.4rem 0.9rem;
      border-radius: var(--radius-sm); font-size: 0.875rem;
      font-weight: 500; transition: all .2s;
    }
    .nav-link:hover { background: var(--bg-600); color: var(--text-100); text-decoration: none; }
    .nav-link.active { background: rgba(99,179,237,0.12); color: var(--accent); }
    .btn-nav {
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      color: #fff !important; padding: 0.45rem 1.1rem;
      border-radius: var(--radius-sm); font-weight: 600; font-size: 0.875rem;
      border: none; cursor: pointer; transition: opacity .2s, transform .15s;
    }
    .btn-nav:hover { opacity: 0.9; transform: translateY(-1px); text-decoration: none; }

    /* ── Main content ──────────────────────────────────────────── */
    .main { flex: 1; max-width: 1400px; margin: 0 auto; padding: 2.5rem 2rem; width: 100%; }

    /* ── Cards ─────────────────────────────────────────────────── */
    .card {
      background: var(--bg-800);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      transition: border-color .25s, box-shadow .25s;
    }
    .card:hover { border-color: var(--border-h); box-shadow: var(--shadow); }
    .card-title {
      font-size: 1rem; font-weight: 600;
      color: var(--text-100); margin-bottom: 0.25rem;
    }
    .card-subtitle { font-size: 0.8rem; color: var(--text-300); }

    /* ── Status badges ─────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 0.25rem 0.65rem; border-radius: 100px;
      font-size: 0.72rem; font-weight: 600; letter-spacing: .04em;
      text-transform: uppercase;
    }
    .badge::before {
      content: ''; width: 6px; height: 6px;
      border-radius: 50%; background: currentColor;
    }
    .badge-PENDING  { background: rgba(251,191,36,.12); color: #fbbf24; }
    .badge-RUNNING  { background: rgba(99,179,237,.12); color: var(--accent); animation: pulse-badge 2s infinite; }
    .badge-DONE     { background: rgba(16,185,129,.12); color: var(--accent-3); }
    .badge-FAILED   { background: rgba(239,68,68,.12);  color: var(--danger); }
    .badge-MAX_ITER { background: rgba(245,158,11,.12); color: var(--accent-4); }

    @keyframes pulse-badge {
      0%, 100% { opacity: 1; }
      50%       { opacity: .6; }
    }

    /* ── Buttons ───────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0.6rem 1.3rem; border-radius: var(--radius-sm);
      font-size: 0.875rem; font-weight: 600; cursor: pointer;
      border: none; transition: all .2s; white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: var(--shadow); }
    .btn-ghost {
      background: transparent; color: var(--text-200);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--border-h); color: var(--text-100); background: var(--bg-600); }
    .btn-danger { background: rgba(239,68,68,.1); color: var(--danger); border: 1px solid rgba(239,68,68,.2); }
    .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.78rem; }

    /* ── Forms ─────────────────────────────────────────────────── */
    .form-group { margin-bottom: 1.25rem; }
    .form-label {
      display: block; font-size: 0.82rem; font-weight: 600;
      color: var(--text-200); margin-bottom: 0.4rem; letter-spacing: .02em;
    }
    .form-control {
      width: 100%; background: var(--bg-700);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text-100); padding: 0.7rem 0.9rem; font-size: 0.9rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .form-control:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,179,237,.12);
    }
    .form-control::placeholder { color: var(--text-400); }
    textarea.form-control { resize: vertical; min-height: 120px; font-family: inherit; }
    .form-hint { font-size: 0.75rem; color: var(--text-300); margin-top: 0.3rem; }

    /* ── Alerts ────────────────────────────────────────────────── */
    .alert {
      padding: 0.85rem 1.1rem; border-radius: var(--radius-sm);
      font-size: 0.875rem; border-left: 3px solid;
      margin-bottom: 1.25rem;
    }
    .alert-error { background: rgba(239,68,68,.08); border-color: var(--danger); color: #fca5a5; }
    .alert-success { background: rgba(16,185,129,.08); border-color: var(--accent-3); color: #6ee7b7; }

    /* ── Divider ───────────────────────────────────────────────── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    /* ── Utility ───────────────────────────────────────────────── */
    .text-muted { color: var(--text-300); }
    .text-sm    { font-size: 0.8rem; }
    .text-xs    { font-size: 0.72rem; }
    .font-mono  { font-family: var(--mono); }
    .flex       { display: flex; }
    .items-center { align-items: center; }
    .gap-2     { gap: 0.5rem; }
    .gap-3     { gap: 0.75rem; }
    .gap-4     { gap: 1rem; }
    .mt-1      { margin-top: 0.25rem; }
    .mt-2      { margin-top: 0.5rem; }
    .mt-3      { margin-top: 0.75rem; }
    .mt-4      { margin-top: 1rem; }
    .mb-4      { margin-bottom: 1rem; }
    .mb-6      { margin-bottom: 1.5rem; }
    .w-full    { width: 100%; }

    /* ── Footer ────────────────────────────────────────────────── */
    .footer {
      text-align: center; padding: 1.5rem;
      color: var(--text-400); font-size: 0.78rem;
      border-top: 1px solid var(--border);
    }
    .footer a { color: var(--text-300); }
    .footer a:hover { color: var(--accent); }

    /* ── Animations ────────────────────────────────────────────── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeInUp .4s ease both; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
<div class="page-wrapper">
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="{% url 'dashboard' %}" class="navbar-brand">
        <div class="brand-icon">🤖</div>
        AgentFlow
      </a>
      <div class="navbar-links">
        <a href="{% url 'dashboard' %}" class="nav-link {% block nav_dashboard %}{% endblock %}">Dashboard</a>
        <a href="{% url 'pipeline-create' %}" class="btn-nav">+ New Pipeline</a>
      </div>
    </div>
  </nav>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    AgentFlow · Multi-Agent Orchestration · Powered by
    <a href="https://anthropic.com" target="_blank">Claude Sonnet</a>
  </footer>
</div>

{% block extra_scripts %}{% endblock %}
</body>
</html>
